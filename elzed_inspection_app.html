<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>דו״ח סטטוס | ELZED</title>
<meta name="theme-color" content="#b52259">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ELZED">
<link rel="apple-touch-icon" href="https://iliya-elzed.github.io/elzed-inspection/logo_elzed.png">
<link rel="manifest" href="https://iliya-elzed.github.io/elzed-inspection/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#0d0d0d; --surface:#1a1a1a; --surface2:#242424;
  --border:#2e2e2e; --accent:#00e5a0; --accent-dim:rgba(0,229,160,0.1);
  --danger:#ff4757; --danger-dim:rgba(255,71,87,0.1);
  --text:#f0f0f0; --muted:#777; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:40px}

/* Header */
.header{padding:14px 20px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.logo{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--accent)}
.date-badge{font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer}
.date-badge:hover{border-color:var(--accent);color:var(--accent)}
.date-edit-input{background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text);font-family:'Heebo',sans-serif;outline:none;width:110px;text-align:center}
.client-name{font-size:19px;font-weight:700}
.header-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.header-sub{font-size:12px;color:var(--muted)}
.divider{width:1px;height:10px;background:var(--border)}
.inspector-input{background:transparent;border:none;font-size:12px;color:var(--muted);font-family:'Heebo',sans-serif;outline:none;flex:1}
.inspector-input::placeholder{color:#444}
.inspector-input.required{color:var(--danger);animation:shake 0.4s ease}
.inspector-input.required::placeholder{color:var(--danger)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Progress */
.progress-wrap{padding:10px 20px;border-bottom:1px solid var(--border)}
.progress-bar-bg{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease}
.progress-text{font-size:11px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between}

/* Screens */
.screen{display:none;padding:20px}
.screen.active{display:block}
#screenInspect{padding:0;overflow:visible}

/* Login */
.login-hero{text-align:center;padding:50px 0 36px}
.login-logo{font-size:13px;font-weight:700;letter-spacing:4px;color:var(--accent);margin-bottom:18px}
.login-title{font-size:36px;font-weight:900;margin-bottom:10px;line-height:1.2}
.login-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:36px}
.btn-google{width:100%;background:#fff;color:#333;border:none;border-radius:var(--radius);padding:16px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:disabled{opacity:0.5;cursor:default}

/* Loading */
.loading-screen{text-align:center;padding:80px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:var(--muted)}

/* Sheet picker */
.picker-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:16px;padding-top:4px}
.sheet-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s}
.sheet-item:active{border-color:var(--accent)}
.sheet-item-name{font-size:16px;font-weight:500}
.sheet-arrow{color:var(--muted);font-size:16px}

/* Room sticky bar */
.room-bar{position:sticky;top:var(--header-h,0px);z-index:9;background:var(--bg);padding:10px 20px 8px;border-bottom:1px solid var(--border)}
.inspect-content{padding:16px 20px 20px}
.room-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-title{font-size:14px;font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-area{font-size:22px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-dots{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.room-dot{height:3px;flex:1;min-width:6px;max-width:24px;border-radius:3px;background:var(--border);transition:background 0.3s}
.room-dot.done{background:var(--accent)}
.room-dot.current{background:var(--accent);opacity:0.45}

/* Prof section */
.prof-section{margin-bottom:20px}
.prof-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prof-title{font-size:15px;font-weight:700;letter-spacing:0px;color:var(--accent);margin-bottom:10px}
.check-all-wrap{display:flex;align-items:center;gap:5px;cursor:pointer}
.check-all-label{font-size:10px;color:var(--muted)}
.check-all-btn{width:26px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.check-all-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Item row */
.item-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;overflow:hidden;transition:border-color 0.2s}
.item-row.is-ok{border-color:var(--accent)}
.item-row.is-bad{border-color:var(--danger)}
.item-row.is-warn{border-color:#ffc800}
.item-top{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px}
.item-name{font-size:14px;font-weight:500;flex:1;padding-left:8px;line-height:1.3}
.toggle-group{display:flex;gap:5px;flex-shrink:0}
.toggle-btn{width:40px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.toggle-btn.ok{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.toggle-btn.bad{background:var(--danger-dim);border-color:var(--danger);color:var(--danger)}
.two-cols{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.col-label{font-size:9px;color:var(--muted)}
.col-row{display:flex;align-items:center;gap:4px}

/* Rating 1-5 */
.rating-wrap{display:flex;gap:4px;flex-shrink:0}
.rating-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'Heebo',sans-serif}
.rating-btn.sel-1,.rating-btn.sel-2{background:rgba(255,71,87,0.15);border-color:var(--danger);color:var(--danger)}
.rating-btn.sel-3{background:rgba(255,200,0,0.15);border-color:#ffc800;color:#ffc800}
.rating-btn.sel-4,.rating-btn.sel-5{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Note */
.note-wrap{border-top:1px solid var(--border)}
.note-input{width:100%;background:transparent;border:none;padding:8px 12px;color:var(--muted);font-family:'Heebo',sans-serif;font-size:12px;outline:none}
.note-input::placeholder{color:#444}
.note-input.note-required{color:var(--danger);border-top:1px solid var(--danger)}
.note-input.note-required::placeholder{color:var(--danger)}
.photo-wrap{padding:6px 12px 10px}
.photo-btn{display:inline-block;padding:7px 14px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted)}

.no-defects{text-align:center;padding:20px;color:var(--accent);font-size:14px}
.summary-stats-row{display:flex;gap:10px;margin-bottom:16px}
.summary-stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.summary-stat-box.ok{border-color:var(--accent)}
.summary-stat-box.bad{border-color:var(--danger)}
.summary-stat-num{font-size:28px;font-weight:900;line-height:1}
.summary-stat-box.ok .summary-stat-num{color:var(--accent)}
.summary-stat-box.bad .summary-stat-num{color:var(--danger)}
.summary-stat-label{font-size:10px;color:var(--muted);margin-top:4px}
.defect-section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--danger);margin:16px 0 8px}
.defect-room-group{margin-bottom:14px}
.defect-room-header{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.defect-row{background:var(--surface);border:1px solid var(--danger);border-radius:10px;padding:8px 12px;margin-bottom:6px}
.defect-row-name{font-size:13px;font-weight:500;color:var(--text)}
.defect-row-note{font-size:12px;color:var(--muted);margin-top:3px}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:15px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-primary:disabled{opacity:0.4;cursor:default}
.nav-row{display:flex;gap:10px;margin-top:16px;padding:0 20px 20px}
.btn-next{flex:2;background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:14px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer!important;opacity:1!important;pointer-events:auto!important}
.btn-prev{flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.done-screen{text-align:center;padding:70px 20px}

/* Toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:13px;transition:transform 0.3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.toast.error{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none">
  <div class="header-top">
    <img src="https://iliya-elzed.github.io/elzed-inspection/logo_elzed.png" style="height:26px;object-fit:contain;border-radius:50%" />
    <input type="text" class="date-badge" id="headerDate" placeholder="DD/MM/YYYY" title="תאריך ביקורת" oninput="currentDate=this.value;saveLocal()" />
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
    <img id="clientLogo" style="height:28px;object-fit:contain;display:none" />
    <div class="client-name" id="headerClient"></div>
  </div>
  <div class="header-meta">
    <div class="header-sub" id="headerSub"></div>
    <div class="divider"></div>
    <input class="inspector-input" id="inspectorInput" placeholder="✏️ שם הבודק..." />
  </div>
</div>
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text"><span id="progressLabel"></span><span id="progressPct"></span></div>
</div>

<!-- LOGIN -->
<div class="screen active" id="screenLogin">
  <div class="login-hero">
    <img src="https://iliya-elzed.github.io/elzed-inspection/logo_elzed.png" style="width:100px;height:100px;object-fit:contain;margin-bottom:12px;border-radius:50%" />
    <div class="login-title">דו״ח סטטוס<br>דו שבועי</div>
    <div class="login-sub">התחבר עם חשבון Google<br>כדי לפתוח את הגיליון</div>
    <button class="btn-google" id="btnSignIn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span id="btnSignInText">טוען...</span>
    </button>
  </div>
</div>

<!-- CLIENT PICKER -->
<div class="screen" id="screenClient">
  <div class="picker-title">בחר לקוח</div>
  <div id="clientList"></div>
</div>

<!-- SHEET PICKER -->
<div class="screen" id="screenPicker">
  <div class="picker-title">בחר גיליון לביקורת</div>
  <div id="sheetList"></div>
</div>

<!-- LOADING -->
<div class="screen" id="screenLoading">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">טוען...</div>
  </div>
</div>

<!-- INSPECT -->
<div class="screen" id="screenInspect">
  <div class="room-bar">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="room-label">חדר <span id="roomCounter"></span></div>
    </div>
    <div class="room-title" id="currentRoomName"></div>
    <div class="room-area" id="currentRoomArea"></div>
    <div class="room-dots" id="roomDots"></div>
  </div>
  <div class="inspect-content">
    <div id="professionsList"></div>
    <div class="nav-row">
      <button class="btn-prev" id="btnPrev" onclick="prevRoom()">→ חזור</button>
      <button class="btn-next" id="btnNext" onclick="nextRoom()">הבא ←</button>
    </div>
  </div>
</div>

<!-- SUMMARY -->
<div class="screen" id="screenSummary">
  <div style="padding:16px 20px 0">
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:12px">סיכום ביקורת</div>
    <div class="summary-stats-row">
      <div class="summary-stat-box ok">
        <div class="summary-stat-num" id="statOk">0</div>
        <div class="summary-stat-label">תקינים</div>
      </div>
      <div class="summary-stat-box bad">
        <div class="summary-stat-num" id="statBad">0</div>
        <div class="summary-stat-label">ליקויים</div>
      </div>
      <div class="summary-stat-box total">
        <div class="summary-stat-num" id="statTotal">0</div>
        <div class="summary-stat-label">סה״כ נבדקו</div>
      </div>
    </div>
  </div>
  <div style="padding:0 20px 20px">
    <button class="btn-primary" id="btnSave" onclick="saveToSheets()">שמור לגיליון ←</button>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="screenDone">
  <div class="done-screen">
    <div class="big-icon">🎉</div>
    <div class="summary-title">נשמר בהצלחה!</div>
    <div class="loading-msg" style="margin-top:10px" id="savedMsg"></div>
    <button class="btn-primary" style="margin-top:36px;max-width:280px;margin-left:auto;margin-right:auto;display:block" onclick="resetApp()">ביקורת חדשה</button>
  </div>
</div>

<script>
const CLIENT_ID='819927044207-htb20ck61nvorlbsje7a4gr7i26ktvg2.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/presentations';
const SKIP_SHEETS=['הגדרות לקוח','Sheet1','גיליון1','גיליון 1','פורמט','Format','format'];

// ── לקוחות ──
const CLIENTS=[
  {name:'המילטון ליין', id:'1DOnRihFR3EkK3QAgzfgp8RAfTC5uhpLp2cXq7HBDh8c', logo:'https://iliya-elzed.github.io/elzed-inspection/logo_hamilton.png', folder:'1mc2rOeYfkmQja0Gih1Ajamo8ebRPTIO4', slideTemplate:'1v1sGlNvflo0QpOxAgiE6AoGEdm3q2ZsTD17dZhxQUcg', dataRange:'F11:F230', total:220},
  {name:'גארדיו',       id:'1V788khC5Z6CI5SGTMO5znCUk82t50VJ7xK1Wrvc_-AU', logo:'https://iliya-elzed.github.io/elzed-inspection/logo_gardio.png',   folder:'1aTm1YVZvMVZyvpNDLJ6BS7IIejgGE2Yj', slideTemplate:'1k37Ak-FpMinbsTy2uGep7js5YrVyzbaX9JxvyDBRTmQ', dataRange:'F11:F664', total:654},
  {name:'זניטי',        id:'14p_B3TXxDfiTKQ2N0VWmGa1dqDMYdOJk6D4Ev0KD6N0', logo:'https://iliya-elzed.github.io/elzed-inspection/logo_zenity.png',   folder:'1fG8wnmLen_2Mp7PrY4zijrFc5Qo0n77Q', slideTemplate:'1IuS0-DB2WCzbGCZOcecLqo3HR3b1JYyk1cY8UOs2noc', dataRange:'F11:F391', total:381},
];
let currentSlideTemplate='';
let currentDataRange='F11:F230';
let currentTotal=220;

// סעיפים שמקבלים דירוג 1-5 (לפי שם הפריט בדיוק)
const RATING_ITEMS=['מצב צבע כללי','מצב הניקיון'];

let currentFolder='';
const C_ROOM=0,C_AREA=1,C_PROF=2,C_ITEM=3,C_CHECKED=4,C_STATUS=5,C_NOTE=6;

let accessToken=null,tokenClient=null;
let sheetData=[],rooms=[],answers={};
let currentRoomIdx=0,sheetTitle='',currentDate='',SPREADSHEET_ID='';

function roomKey(r,a){return r+'||'+(a||'')}
function isRating(item){return RATING_ITEMS.includes(item)}



// ── GSI Init ──
function initGSI(){
  try{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      prompt:'select_account consent',
      callback:(resp)=>{
        if(resp.error){showToast('שגיאה: '+resp.error,'error');return;}
        accessToken=resp.access_token;
        showClientPicker();
      }
    });
    document.getElementById('btnSignInText').textContent='התחבר עם Google';
    document.getElementById('btnSignIn').disabled=false;
  }catch(e){
    document.getElementById('btnSignInText').textContent='שגיאה — רענן';
    console.error(e);
  }
}
function tryInit(n){
  if(typeof google!=='undefined'&&google.accounts)initGSI();
  else if(n>0)setTimeout(()=>tryInit(n-1),500);
  else{document.getElementById('btnSignInText').textContent='שגיאת טעינה — רענן';document.getElementById('btnSignIn').disabled=false;}
}
window.addEventListener('load',()=>{
  document.getElementById('btnSignIn').disabled=true;
  setTimeout(()=>tryInit(12),300);
});

function signIn(){if(tokenClient)tokenClient.requestAccessToken();}

// ── Local Storage ──
function saveLocal(){
  try{
    const state={
      answers,
      currentRoomIdx,
      sheetTitle,
      currentDate:document.getElementById('headerDate')?.value||currentDate,
      SPREADSHEET_ID,
      inspector:document.getElementById('inspectorInput')?.value||''
    };
    localStorage.setItem('elzed_state',JSON.stringify(state));
  }catch(e){console.warn('saveLocal failed:',e);}
}

function loadLocal(){
  try{
    const raw=localStorage.getItem('elzed_state');
    if(!raw)return false;
    return JSON.parse(raw);
  }catch(e){return false;}
}

function clearLocal(){
  localStorage.removeItem('elzed_state');
}

// ── Helpers ──
function today(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function showToast(msg,type,dur){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),dur||3000)}
function setProgress(cur,total){
  const doneCount=sheetData.filter(d=>isItemDone(d)).length;
  const totalCount=sheetData.length;
  const pct=totalCount?Math.round((doneCount/totalCount)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`חדר ${cur} מתוך ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';
}
function colLetter(n){let s='';while(n>0){s=String.fromCharCode(64+(n%26||26))+s;n=Math.floor((n-1)/26);}return s}
async function gFetch(url,opts={}){
  const res=await fetch(url,{...opts,headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
  const data=await res.json();
  if(!res.ok)throw new Error(data.error?.message||`HTTP ${res.status}`);
  return data;
}

// ── Client picker ──
function showClientPicker(){
  if(CLIENTS.length===1){
    loadSheetMeta(CLIENTS[0]);
    return;
  }
  document.getElementById('mainHeader').style.display='block';
  document.getElementById('clientList').innerHTML=CLIENTS.map(c=>`
    <div class="sheet-item" onclick="loadSheetMeta(CLIENTS.find(x=>x.id==='${c.id}'))">
      <span class="sheet-item-name">${c.name}</span>
      <span class="sheet-arrow">←</span>
    </div>`).join('');
  showScreen('screenClient');
}

// ── Load meta → show sheet picker ──
async function loadSheetMeta(client){
  currentFolder=client.folder||'';
  currentSlideTemplate=client.slideTemplate||'';
  currentDataRange=client.dataRange||'F11:F230';
  currentTotal=client.total||0;
  SPREADSHEET_ID=client.id;
  document.getElementById('mainHeader').style.display='block';
  showScreen('screenLoading');
  document.getElementById('loadingMsg').textContent='מתחבר...';
  try{
    const meta=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=properties.title,sheets.properties`);
    document.getElementById('headerClient').textContent=client.name;
    document.getElementById('headerDate').value=today();
    currentDate=today();
    // הצג לוגו לקוח
    const logoEl=document.getElementById('clientLogo');
    if(client.logo){logoEl.src=client.logo;logoEl.style.display='block';}
    else{logoEl.style.display='none';}
    const sheets=meta.sheets.map(s=>s.properties).filter(s=>!SKIP_SHEETS.includes(s.title));
    if(!sheets.length)throw new Error('לא נמצא גיליון ביקורת.');
    document.getElementById('sheetList').innerHTML=sheets.map(s=>`
      <div class="sheet-item" onclick="pickSheet('${s.title.replace(/'/g,"\\'")}')">
        <span class="sheet-item-name">${s.title}</span>
        <span class="sheet-arrow">←</span>
      </div>`).join('');
    showScreen('screenPicker');
    setTimeout(()=>document.getElementById('inspectorInput').focus(),300);
  }catch(e){
    showScreen('screenLogin');
    document.getElementById('mainHeader').style.display='none';
    showToast('❌ '+e.message,'error',5000);
  }
}

// ── Pick sheet → parse ──
async function pickSheet(title){
  // ולידציה — שם בודק חובה
  const inspector=document.getElementById('inspectorInput').value.trim();
  if(!inspector){
    const inp=document.getElementById('inspectorInput');
    inp.classList.add('required');
    inp.placeholder='⚠️ שם הבודק חובה!';
    inp.focus();
    setTimeout(()=>{inp.classList.remove('required');inp.placeholder='שם הבודק...';},2000);
    showToast('יש להזין שם בודק לפני הבחירה','error');
    return;
  }
  // וודא תאריך מולא
  if(!currentDate||currentDate===''){
    showToast('⚠️ יש להזין תאריך','error');
    document.getElementById('headerDate').style.borderColor='var(--danger)';
    document.getElementById('headerDate').focus();
    return;
  }
  sheetTitle=title;
  document.getElementById('headerSub').textContent=`גיליון: ${sheetTitle}`;
  document.getElementById('progressWrap').style.display='block';
  showScreen('screenLoading');
  document.getElementById('loadingMsg').textContent='קורא נתונים...';
  try{
    const dataRes=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}`);
    const rows=dataRes.values||[];

    // Find header row
    let hIdx=-1;
    for(let i=0;i<rows.length;i++){
      if(rows[i]?.[0]?.toString().trim()==='חלל'){hIdx=i;break;}
    }
    if(hIdx===-1){
      for(let i=0;i<rows.length;i++){
        if(rows[i]?.some(c=>c?.toString().trim()==='חלל')){hIdx=i;break;}
      }
    }
    if(hIdx===-1)throw new Error('לא נמצאה שורת כותרת.');

    sheetData=[];rooms=[];answers={};
    const roomSet=new Set();
    let lastRoom='',lastArea='',lastProf='';

    for(let i=hIdx+1;i<rows.length;i++){
      const row=rows[i]||[];
      const rr=row[C_ROOM]?.toString().trim();
      const ra=row[C_AREA]?.toString().trim();
      const rp=row[C_PROF]?.toString().trim();
      if(rr)lastRoom=rr;
      if(ra)lastArea=ra;
      if(rp)lastProf=rp;
      const room=lastRoom,area=lastArea,prof=lastProf;
      const item=row[C_ITEM]?.toString().trim()||'';
      if(!room||!item)continue;
      const isComment=item==='הערות נוספות';
      if(item==='פירוט'||item==='מה נבדק')continue;
      if(room==='חלל'||prof==='מה נבדק'||prof==='מקצוע')continue;
      if(room.startsWith('סה')||item.startsWith('סה')||room.startsWith('📊'))continue;
      if(!prof)continue;
      const rk=roomKey(room,area);
      if(!roomSet.has(rk)){roomSet.add(rk);rooms.push({room,area,key:rk});}
      answers[i]={status:null,checked:null,rating:null,note:'',photo:null,rowIndex:i+1,statusCol:C_STATUS+1,checkedCol:C_CHECKED+1,noteCol:C_NOTE+1};
      sheetData.push({roomKey:rk,room,area,prof,item,key:i,isComment:isComment||false});
    }
    if(!rooms.length)throw new Error('לא נמצאו חדרים בגיליון.');
    // בדוק אם יש מצב שמור
    const saved=loadLocal();
    if(saved&&saved.sheetTitle===title&&saved.SPREADSHEET_ID===SPREADSHEET_ID){
      // שחזר תשובות ומיקום
      Object.keys(saved.answers).forEach(k=>{
        if(answers[k])answers[k]={...answers[k],...saved.answers[k]};
      });
      currentRoomIdx=Math.min(saved.currentRoomIdx||0,rooms.length-1);
      if(saved.inspector)document.getElementById('inspectorInput').value=saved.inspector;
      showToast('✅ ממשיך מהמקום שהפסקת','success',3000);
    } else {
      currentRoomIdx=0;
    }
    renderRoom();
    showScreen('screenInspect');
    setProgress(currentRoomIdx+1,rooms.length);
    updateHeaderHeight();
  }catch(e){
    showScreen('screenPicker');
    showToast('❌ '+e.message,'error',5000);
    console.error(e);
  }
}

// ── Render room ──
function updateHeaderHeight(){
  const h=document.getElementById('mainHeader');
  const p=document.getElementById('progressWrap');
  if(h&&p){
    const total=(h.offsetHeight||0)+(p.offsetHeight||0);
    document.documentElement.style.setProperty('--header-h', total+'px');
  }
}

function renderRoom(){
  const {room,area,key:rk}=rooms[currentRoomIdx];
  document.getElementById('roomCounter').textContent=`${currentRoomIdx+1} מתוך ${rooms.length}`;
  document.getElementById('currentRoomName').textContent=room;
  document.getElementById('currentRoomArea').textContent=area||'';
  document.getElementById('btnPrev').style.opacity=currentRoomIdx===0?'0.3':'1';
  document.getElementById('roomDots').innerHTML=rooms.map((_,i)=>
    `<div class="room-dot ${i<currentRoomIdx?'done':i===currentRoomIdx?'current':''}"></div>`).join('');

  const roomItems=sheetData.filter(d=>d.roomKey===rk);
  const byProf={};
  roomItems.forEach(d=>{if(!byProf[d.prof])byProf[d.prof]=[];byProf[d.prof].push(d);});

  document.getElementById('professionsList').innerHTML=Object.entries(byProf).map(([prof,items])=>{
    const profId='p'+prof.replace(/[^\w]/g,'_')+'_'+rk.replace(/[^\w]/g,'_');
    const rating=items.some(d=>isRating(d.item));
    return `
    <div class="prof-section">
      <div class="prof-header">
        <div class="prof-title">${prof}</div>
        
      </div>
      ${items.map(d=>{
        const a=answers[d.key];
        const eid='e'+d.key;
        const checked=a.checked==='ok';
        const hasRating=isRating(d.item);
        // הערות נוספות — textarea בלבד
        if(d.isComment){return '<div class="item-row" id="'+eid+'" style="border-color:var(--border)"><div class="item-top"><span class="item-name" style="color:var(--muted);font-size:12px">'+d.item+'</span></div><div class="note-wrap"><textarea id="n'+d.key+'" class="note-input" rows="2" placeholder="הוסף הערה כללית..." style="resize:vertical;min-height:60px" oninput="answers['+d.key+'].note=this.value;saveLocal()">'+(a.note||'')+'</textarea></div></div>';}
        return `
        <div class="item-row ${a.status==='ok'?'is-ok':a.status==='bad'?'is-bad':''}" id="${eid}">
          <div class="item-top">
            <span class="item-name">${d.item}</span>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
              <div class="col-row">
                <span class="col-label">נבדק?</span>
                <button class="toggle-btn ${checked?'ok':''}" id="chk${d.key}" onclick="setChecked(${d.key},'${eid}',this)">✓</button>
              </div>
              <div id="vx${d.key}" class="col-row" style="display:${checked?'flex':'none'}">
                <span class="col-label">${hasRating?'דירוג':'תקין?'}</span>
                ${hasRating
                  ? `<div class="rating-wrap">${[1,2,3,4,5].map(n=>`<button class="rating-btn ${a.rating===n?'sel-'+n:''}" onclick="setRating(${d.key},'${eid}',this,${n})">${n}</button>`).join('')}</div>`
                  : `<div class="toggle-group">
                      <button class="toggle-btn ${a.status==='bad'?'bad':''}" onclick="setStatus(${d.key},'${eid}',this,'bad')">✗</button>
                      <button class="toggle-btn ${a.status==='ok'?'ok':''}" onclick="setStatus(${d.key},'${eid}',this,'ok')">✓</button>
                    </div>`
                }
              </div>
            </div>
          </div>
          <div id="nw${d.key}" class="note-wrap" style="display:${a.status==='bad'||(hasRating&&a.rating&&a.rating<=3)?'block':'none'}">
            <input id="n${d.key}" class="note-input ${a.status==='bad'||(hasRating&&a.rating&&a.rating<=3)?'note-required':''}" placeholder="${hasRating&&a.rating&&a.rating<=3?'⚠️ חובה: הסבר לדירוג נמוך...':'הוסף הערה...'}" value="${(a.note||'').replace(/"/g,'&quot;')}" oninput="answers[${d.key}].note=this.value;saveLocal()" />
          </div>
          <div id="pw${d.key}" class="photo-wrap" style="display:${a.status==='bad'?'block':'none'}">
            <label class="photo-btn" id="pl${d.key}" onclick="document.getElementById('pi${d.key}').click()">${a.photo?'✅ תמונה צורפה':'📷 צרף תמונה'}</label>
            <input id="pi${d.key}" type="file" accept="image/*" capture="environment" style="display:none" onchange="addPhoto(${d.key},this)" />
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
  setProgress(currentRoomIdx+1,rooms.length);
  const nb=document.getElementById('btnNext');if(nb){nb.disabled=false;nb.style.opacity='1';}
}

// ── Interactions ──
function setChecked(key,eid,btn){
  const a=answers[key];
  a.checked=a.checked==='ok'?null:'ok';
  btn.className='toggle-btn '+(a.checked==='ok'?'ok':'');
  const vx=document.getElementById('vx'+key);
  if(vx) vx.style.display=a.checked==='ok'?'flex':'none';
  setProgress(currentRoomIdx+1,rooms.length);
  const nb=document.getElementById('btnNext');if(nb){nb.disabled=false;nb.style.opacity='1';}
}
async function uploadPhotoToDrive(dataUrl,fileName){
  console.log('📸 folder:', currentFolder, 'token:', accessToken?'exists':'MISSING');
  if(!currentFolder){alert('אין Folder ID');return null;}
  // שלב 1: צור קובץ עם metadata
  const metaRes=await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{
    method:'POST',
    headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
    body:JSON.stringify({name:fileName,parents:[currentFolder],mimeType:'image/jpeg'})
  });
  const metaData=await metaRes.json();
  console.log('Step1 create:', metaRes.status, metaData);
  if(!metaRes.ok){
    alert('DRIVE ERROR '+metaRes.status+': '+JSON.stringify(metaData.error));
    throw new Error(metaData.error?.message);
  }
  const fileId=metaData.id;
  // שלב 2: העלה תוכן
  const b64=dataUrl.split(',')[1];
  const binary=atob(b64);
  const arr=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)arr[i]=binary.charCodeAt(i);
  const imgBlob=new Blob([arr],{type:'image/jpeg'});
  const uploadRes=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&fields=id,webViewLink`,{
    method:'PATCH',
    headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'image/jpeg'},
    body:imgBlob
  });
  const uploadData=await uploadRes.json();
  console.log('Step2 upload:', uploadRes.status, uploadData);
  if(!uploadRes.ok){
    alert('UPLOAD ERROR '+uploadRes.status+': '+JSON.stringify(uploadData.error));
    throw new Error(uploadData.error?.message);
  }
  return uploadData.webViewLink||`https://drive.google.com/file/d/${fileId}/view`;
}

function addPhoto(key,input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    // Resize to max 1200px
    const img=new window.Image();
    img.onload=()=>{
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      answers[key].photo=canvas.toDataURL('image/jpeg',0.75);
      // עדכן כפתור
      const lbl=document.getElementById('pl'+key);
      if(lbl)lbl.textContent='✅ תמונה צורפה';
        };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function isItemDone(d){
  const a=answers[d.key];
  if(isRating(d.item)) return !!a.rating;
  if(a.status==='ok') return true;
  if(a.status==='bad') return !!(a.note&&a.note.trim());
  return false;
}




function setStatus(key,eid,btn,status){
  const a=answers[key];
  a.status=a.status===status?null:status;
  btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b=>b.className='toggle-btn');
  if(a.status)btn.classList.add(a.status==='ok'?'ok':'bad');
  const el=document.getElementById(eid);
  if(el)el.className=`item-row ${a.status==='ok'?'is-ok':a.status==='bad'?'is-bad':''}`;
  // הצג/הסתר שדה הערה ותמונה
  const noteWrap2=document.getElementById('nw'+key);
  const photoWrap2=document.getElementById('pw'+key);
  if(noteWrap2) noteWrap2.style.display=a.status==='bad'?'block':'none';
  if(photoWrap2) photoWrap2.style.display=a.status==='bad'?'block':'none';
  if(a.status==='bad'){
    setTimeout(()=>{
      const ni=document.getElementById('n'+key);
      if(ni){ni.scrollIntoView({behavior:'smooth',block:'center'});ni.focus();}
    },100);
  }
  setProgress(currentRoomIdx+1,rooms.length);
  const nb=document.getElementById('btnNext');if(nb){nb.disabled=false;nb.style.opacity='1';}
}
function setRating(key,eid,btn,n){
  const a=answers[key];
  a.rating=a.rating===n?null:n;
  btn.closest('.rating-wrap').querySelectorAll('.rating-btn').forEach(b=>{b.className='rating-btn';});
  if(a.rating)btn.className=`rating-btn sel-${a.rating}`;
  const isBad=a.rating&&a.rating<=2;
  const isWarn=a.rating===3;
  const el=document.getElementById(eid);
  if(el)el.className=`item-row ${isBad?'is-bad':isWarn?'is-warn':''}`;
  // הצג שדה הערה לדירוג ≤ 3
  const nw=document.getElementById('nw'+key);
  const ni=document.getElementById('n'+key);
  if(nw){
    const show=a.rating&&a.rating<=3;
    nw.style.display=show?'block':'none';
    if(ni){
      ni.placeholder=show?'⚠️ חובה: הסבר לדירוג נמוך...':'הוסף הערה...';
      ni.className='note-input'+(show?' note-required':'');
      if(show)setTimeout(()=>{ni.scrollIntoView({behavior:'smooth',block:'center'});ni.focus();},100);
    }
  }
  saveLocal();
  setProgress(currentRoomIdx+1,rooms.length);
  const nb=document.getElementById('btnNext');if(nb){nb.disabled=false;nb.style.opacity='1';}
}
function checkAllProf(prof,rk){
  const items=sheetData.filter(d=>d.prof===prof&&d.roomKey===rk);
  const allOk=items.every(d=>answers[d.key].checked==='ok');
  const newVal=allOk?null:'ok';
  items.forEach(d=>{
    answers[d.key].checked=newVal;
    const el=document.getElementById('e'+d.key);
    if(el){const btns=el.querySelectorAll('.toggle-group')[0]?.querySelectorAll('.toggle-btn');if(btns){btns.forEach(b=>b.className='toggle-btn');if(newVal)btns[0].classList.add('ok');}}
  });
  const btnId='p'+prof.replace(/[^\w]/g,'_')+'_'+rk.replace(/[^\w]/g,'_');
  const btn=document.getElementById(btnId);
  if(btn)btn.className='check-all-btn'+(newVal?' active':'');
}

function nextRoom(){
  if(currentRoomIdx<rooms.length-1){currentRoomIdx++;renderRoom();window.scrollTo(0,0);saveLocal();}else showSummary();
}
function prevRoom(){if(currentRoomIdx>0){currentRoomIdx--;renderRoom();window.scrollTo(0,0);saveLocal();}}

// ── Summary ──
function showSummary(){
  const inspector=document.getElementById('inspectorInput').value.trim();
  if(!inspector){
    const inp=document.getElementById('inspectorInput');
    inp.classList.add('required');
    inp.placeholder='⚠️ שם הבודק חובה!';
    inp.focus();
    setTimeout(()=>{inp.classList.remove('required');inp.placeholder='שם הבודק...';},2000);
    showToast('יש להזין שם בודק','error');
    window.scrollTo(0,0);
    return;
  }
  let ok=0,bad=0;
  const defects=[];
  sheetData.forEach(d=>{
    const a=answers[d.key];
    const isBadRating=isRating(d.item)&&a.rating&&a.rating<=2;
    if(a.status==='ok')ok++;
    else if(a.status==='bad'||isBadRating){bad++;defects.push({...d,note:a.note,rating:a.rating});}
  });
  const total=ok+bad;
  document.getElementById('statOk').textContent=ok;
  document.getElementById('statBad').textContent=bad;
  document.getElementById('statTotal').textContent=total;


  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='הושלם';
  document.getElementById('progressPct').textContent='100%';
  showScreen('screenSummary');
}


// ── Generate Slides Report ──
async function generateReport(){
  if(!currentSlideTemplate)return;
  const inspector=document.getElementById('inspectorInput').value.trim();
  // קרא נתונים מהגיליון
  const rangeRes=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}!${currentDataRange}`);
  const cells=(rangeRes.values||[]).flat();
  let passed=0,failed=0;
  cells.forEach(v=>{
    const s=String(v).trim();
    if(s==='✅'||s==='V'||s==='v'||(Number(s)>=1&&Number(s)<=5))passed++;
    else if(s==='❌'||s==='X'||s==='x')failed++;
  });
  const total=currentTotal;
  // קרא תאריך ושם מהגיליון
  let dateVal=currentDate,inspectorVal=inspector;
  try{
    const hdr=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}!C6:C7`);
    const hvals=(hdr.values||[]);
    if(hvals[0]?.[0])dateVal=hvals[0][0];
    if(hvals[1]?.[0])inspectorVal=hvals[1][0];
  }catch(e){}
  // צור עותק מהתבנית
  const copyRes=await gFetch(`https://www.googleapis.com/drive/v3/files/${currentSlideTemplate}/copy`,{
    method:'POST',
    body:JSON.stringify({name:`דוח ${sheetTitle} - ${dateVal}`})
  });
  if(!copyRes.id){console.warn('Slides copy failed');return;}
  // החלף tags
  const replacements=[
    {replaceAllText:{containsText:{text:'{{total}}',matchCase:true},replaceText:String(total)}},
    {replaceAllText:{containsText:{text:'{{passed}}',matchCase:true},replaceText:String(passed)}},
    {replaceAllText:{containsText:{text:'{{failed}}',matchCase:true},replaceText:String(failed)}},
    {replaceAllText:{containsText:{text:'{{date}}',matchCase:true},replaceText:dateVal}},
    {replaceAllText:{containsText:{text:'{{inspector_name}}',matchCase:true},replaceText:inspectorVal}},
    {replaceAllText:{containsText:{text:'{{average_score}}',matchCase:true},replaceText:total?Math.round((passed/total)*100)+'%':'—'}},
    {replaceAllText:{containsText:{text:'{{recurring_issue}}',matchCase:true},replaceText:'—'}},
  ];
  await gFetch(`https://slides.googleapis.com/v1/presentations/${copyRes.id}:batchUpdate`,{
    method:'POST',
    body:JSON.stringify({requests:replacements})
  });
  showToast('📊 דוח Slides נוצר! https://docs.google.com/presentation/d/'+copyRes.id,'success',6000);
  console.log('✅ Slides:', copyRes.id);
}

// ── Save ──
async function saveToSheets(){
  const btn=document.getElementById('btnSave');
  const inspector=document.getElementById('inspectorInput').value.trim();
  btn.disabled=true;btn.textContent='שומר נתונים...';
  try{
    btn.textContent='מעלה תמונות...';
    // העלה תמונות ל-Drive (אופציונלי — לא חוסם שמירה)
    const photoLinks={};
    for(const d of sheetData){
      const a=answers[d.key];
      if(a.status==='bad'&&a.photo){
        try{
          const fname=`${sheetTitle}_${d.room}_${d.item}.jpg`.replace(/[/\\?%*:|"<>]/g,'_');
          photoLinks[d.key]=await uploadPhotoToDrive(a.photo,fname);
        }catch(e){
          console.error('photo upload failed:',e);
          photoLinks[d.key]='';
          showToast('⚠️ תמונה לא הועלתה — הנתונים ישמרו ללא תמונה','error',3000);
        }
      }
    }
    btn.textContent='כותב לגיליון...';
    // כתוב תאריך לתא C6 ושם בודק לתא C7
    try{
      currentDate=document.getElementById('headerDate').value||currentDate;
      console.log('📅 כותב C6:', currentDate, 'C7:', inspector);
      await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}!C6:C7?valueInputOption=RAW`,
        {method:'PUT',body:JSON.stringify({values:[[currentDate],[inspector]],majorDimension:'ROWS'})});
      console.log('✅ C6/C7 נכתבו בהצלחה');
    }catch(e){console.error('❌ C6/C7 נכשל:',e);}
    const data=sheetData.flatMap(d=>{
      const a=answers[d.key];
      if(d.isComment){
        // הערות נוספות — שמור טקסט לעמודת סטטוס (F)
        if(!a.note)return[];
        return[{range:`${sheetTitle}!${colLetter(a.statusCol)}${a.rowIndex}`,values:[[a.note]]}];
      }
      const checkedVal=a.checked==='ok'?'✅':a.checked==='bad'?'❌':'';
      const statusVal=isRating(d.item)?(a.rating?Number(a.rating):''):(a.status==='ok'?'✅':a.status==='bad'?'❌':'');
      const noteVal=[a.note||'',photoLinks[d.key]||''].filter(Boolean).join(' | ');
      return[
        {range:`${sheetTitle}!${colLetter(a.checkedCol)}${a.rowIndex}`,values:[[checkedVal]]},
        {range:`${sheetTitle}!${colLetter(a.statusCol)}${a.rowIndex}`,values:[[statusVal]]},
        {range:`${sheetTitle}!${colLetter(a.noteCol)}${a.rowIndex}`,values:[[noteVal]]}
      ];
    });
    await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchUpdate`,
      {method:'POST',body:JSON.stringify({valueInputOption:'RAW',data})});
    let ok=0,bad=0;
    Object.values(answers).forEach(a=>{if(a.status==='ok')ok++;else if(a.status==='bad')bad++;});
    document.getElementById('savedMsg').textContent=`${ok} תקינים · ${bad} ליקויים${inspector?' · '+inspector:''}`;
    clearLocal();
    // נסה ליצור דוח Slides
    try{await generateReport();}catch(e){console.warn('generateReport failed:',e);}
    showScreen('screenDone');
  }catch(e){
    btn.disabled=false;btn.textContent='שמור לגיליון ←';
    showToast('❌ שגיאה: '+e.message,'error',5000);
    console.error(e);
  }
}

// ── Date edit ──
function editDate(){
  const el=document.getElementById('headerDate');
  const cur=el.textContent;
  const inp=document.createElement('input');
  inp.className='date-edit-input';inp.value=cur;
  el.replaceWith(inp);inp.focus();inp.select();
  const done=async()=>{
    const newDate=inp.value||cur;
    const nel=document.createElement('div');
    nel.className='date-badge';nel.id='headerDate';nel.title='לחץ לעריכה';
    nel.textContent=newDate;nel.onclick=editDate;
    inp.replaceWith(nel);
    const oldDate=currentDate;
    currentDate=newDate;
    if(newDate!==oldDate && SPREADSHEET_ID && sheetTitle && accessToken){
      try{
        // מצא את ה-sheetId לפי שם הגיליון הנוכחי
        const meta=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets.properties`);
        const found=meta.sheets.find(s=>s.properties.title===sheetTitle);
        if(found){
          const sheetId=found.properties.sheetId;
          await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`,
            {method:'POST',body:JSON.stringify({requests:[{updateSheetProperties:{properties:{sheetId,title:newDate},fields:'title'}}]})});
          sheetTitle=newDate;
          document.getElementById('headerSub').textContent=`גיליון: ${sheetTitle}`;
          // כתוב תאריך לתא C6
          await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}!C6?valueInputOption=RAW`,
            {method:'PUT',body:JSON.stringify({values:[[newDate]],majorDimension:'ROWS'}),headers:{'Content-Type':'application/json'}});
          showToast('✅ לשונית ותא C6 עודכנו','success',3000);
        } else {
          showToast('⚠️ לא נמצאה לשונית: '+sheetTitle,'error',3000);
        }
      }catch(e){showToast('❌ '+e.message,'error',3000);console.error(e);}
    } else if(newDate!==oldDate && !sheetTitle){
      showToast('בחר גיליון תחילה','error');
    }
  };
  inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();};
}

// ── Reset ──
function resetApp(){
  sheetData=[];rooms=[];answers={};currentRoomIdx=0;accessToken=null;
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  showScreen('screenLogin');
  setTimeout(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:(resp)=>{if(!resp.error){accessToken=resp.access_token;showClientPicker();}}
    });
  },300);
}
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    // Inline service worker for GitHub Pages PWA
    const swCode=`
      self.addEventListener('fetch',e=>{
        e.respondWith(fetch(e.request).catch(()=>new Response('offline')));
      });
    `;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  });
}
</script>
