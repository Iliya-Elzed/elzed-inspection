<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ELZED — ביקורת שטח</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root {
  --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #242424;
  --border: #2e2e2e; --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.1);
  --danger: #ff4757; --danger-dim: rgba(255,71,87,0.1);
  --text: #f0f0f0; --muted: #777; --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }
.header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.logo { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.date-badge { font-size: 11px; color: var(--muted); background: var(--surface); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
.client-name { font-size: 20px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.progress-wrap { padding: 12px 20px; border-bottom: 1px solid var(--border); }
.progress-bar-bg { height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.progress-text { font-size: 11px; color: var(--muted); margin-top: 5px; display: flex; justify-content: space-between; }
.screen { display: none; padding: 24px 20px; }
.screen.active { display: block; }
.login-hero { text-align: center; padding: 60px 0 40px; }
.login-logo { font-size: 13px; font-weight: 700; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; }
.login-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
.login-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; }
.btn-google { width: 100%; background: #fff; color: #333; border: none; border-radius: var(--radius); padding: 16px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-google:disabled { opacity: 0.5; cursor: default; }
.loading-screen { text-align: center; padding: 80px 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 14px; color: var(--muted); }
.room-header { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.room-label { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 1.5px; margin-bottom: 4px; }
.room-title { font-size: 22px; font-weight: 900; }
.room-area { font-size: 13px; color: var(--muted); margin-top: 2px; }
.room-dots { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }
.room-dot { height: 3px; flex: 1; min-width: 6px; max-width: 24px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
.room-dot.done { background: var(--accent); }
.room-dot.current { background: var(--accent); opacity: 0.45; }
.prof-section { margin-bottom: 22px; }
.prof-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
.item-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 7px; overflow: hidden; transition: border-color 0.2s; }
.item-row.is-ok { border-color: var(--accent); }
.item-row.is-bad { border-color: var(--danger); }
.item-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 13px 9px; }
.item-name { font-size: 14px; font-weight: 500; flex: 1; padding-left: 8px; line-height: 1.3; }
.toggle-group { display: flex; gap: 5px; flex-shrink: 0; }
.toggle-btn { width: 42px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.toggle-btn.ok { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.toggle-btn.bad { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
.note-wrap { border-top: 1px solid var(--border); }
.note-input { width: 100%; background: transparent; border: none; padding: 9px 13px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 12px; outline: none; }
.note-input::placeholder { color: #444; }
.nav-row { display: flex; gap: 10px; margin-top: 20px; }
.btn-prev { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 14px 18px; font-family: 'Heebo', sans-serif; font-size: 14px; cursor: pointer; }
.btn-next { flex: 1; background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 14px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.summary-hero { text-align: center; padding: 28px 0 20px; }
.big-icon { font-size: 52px; margin-bottom: 10px; }
.summary-title { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
.summary-sub { font-size: 13px; color: var(--muted); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-card.full { grid-column: span 2; }
.stat-num { font-size: 30px; font-weight: 900; }
.stat-num.green { color: var(--accent); }
.stat-num.red { color: var(--danger); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
.defect-section { margin: 20px 0; }
.defect-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
.defect-item { background: var(--danger-dim); border: 1px solid rgba(255,71,87,0.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.defect-room { font-size: 10px; color: var(--danger); font-weight: 700; margin-bottom: 3px; }
.defect-name { font-size: 13px; font-weight: 500; }
.defect-note { font-size: 12px; color: var(--muted); margin-top: 3px; }
.no-defects { text-align: center; padding: 20px; color: var(--accent); font-size: 14px; }
.btn-primary { width: 100%; background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 16px; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.done-screen { text-align: center; padding: 80px 20px; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 30px; padding: 11px 22px; font-size: 13px; transition: transform 0.3s; z-index: 200; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--accent); color: var(--accent); }
.toast.error { border-color: var(--danger); color: var(--danger); }
/* Date edit */
.date-badge { cursor: pointer; }
.date-badge:hover { border-color: var(--accent); color: var(--accent); }
.date-edit-input { background: var(--surface); border: 1px solid var(--accent); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text); font-family: 'Heebo', sans-serif; outline: none; width: 100px; text-align: center; }
/* Photo upload */
.photo-wrap { border-top: 1px solid var(--border); padding: 8px 13px; display: none; }
.photo-wrap.visible { display: block; }
.btn-photo { background: var(--danger-dim); border: 1px dashed var(--danger); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--danger); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Heebo', sans-serif; width: 100%; justify-content: center; }
.photo-preview { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.photo-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.photo-thumb-wrap { position: relative; }
.photo-remove { position: absolute; top: -4px; left: -4px; width: 16px; height: 16px; background: var(--danger); border-radius: 50%; border: none; color: #fff; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
/* Defect photo in summary */
.defect-photos { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.defect-photo { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header" id="mainHeader" style="display:none">
  <div class="header-top">
    <div class="logo">ELZED</div>
    <div class="date-badge" id="headerDate" onclick="editDate()" title="לחץ לעריכה"></div>
  </div>
  <div class="client-name" id="headerClient"></div>
  <div class="header-sub" id="headerSub"></div>
</div>
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text"><span id="progressLabel"></span><span id="progressPct"></span></div>
</div>

<!-- LOGIN -->
<div class="screen active" id="screenLogin">
  <div class="login-hero">
    <div class="login-logo">ELZED</div>
    <div class="login-title">ביקורת<br>שטח</div>
    <div class="login-sub">התחבר עם חשבון Google<br>כדי לפתוח את הגיליון</div>
    <button class="btn-google" id="btnSignIn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span id="btnSignInText">טוען...</span>
    </button>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="screenLoading">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">טוען גיליון...</div>
  </div>
</div>

<!-- INSPECT -->
<div class="screen" id="screenInspect">
  <div class="room-header">
    <div class="room-label">חדר <span id="roomCounter"></span></div>
    <div class="room-title" id="currentRoomName"></div>
    <div class="room-area" id="currentRoomArea"></div>
    <div class="room-dots" id="roomDots"></div>
  </div>
  <div id="professionsList"></div>
  <div class="nav-row">
    <button class="btn-prev" id="btnPrev" onclick="prevRoom()">→ חזור</button>
    <button class="btn-next" id="btnNext" onclick="nextRoom()">הבא ←</button>
  </div>
</div>

<!-- SUMMARY -->
<div class="screen" id="screenSummary">
  <div class="summary-hero">
    <div class="big-icon">📋</div>
    <div class="summary-title">סיכום ביקורת</div>
    <div class="summary-sub" id="summaryInfo"></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num green" id="statOk">0</div><div class="stat-label">תקינים</div></div>
    <div class="stat-card"><div class="stat-num red" id="statBad">0</div><div class="stat-label">ליקויים</div></div>
    <div class="stat-card full"><div class="stat-num" id="statPct">—</div><div class="stat-label">אחוז ליקויים</div></div>
  </div>
  <div class="defect-section">
    <div class="defect-title">ליקויים שנמצאו</div>
    <div id="defectList"></div>
  </div>
  <button class="btn-primary" id="btnSave" onclick="saveToSheets()">שמור לגיליון ←</button>
</div>

<!-- DONE -->
<div class="screen" id="screenDone">
  <div class="done-screen">
    <div class="big-icon">🎉</div>
    <div class="summary-title">נשמר בהצלחה!</div>
    <div class="loading-msg" style="margin-top:10px" id="savedMsg"></div>
    <button class="btn-primary" style="margin-top:40px;max-width:280px;margin-left:auto;margin-right:auto;display:block" onclick="resetApp()">ביקורת חדשה</button>
  </div>
</div>

<script>
const CLIENT_ID = '819927044207-htb20ck61nvorlbsje7a4gr7i26ktvg2.apps.googleusercontent.com';
const SPREADSHEET_ID = '1DOnRihFR3EkK3QAgzfgp8RAfTC5uhpLp2cXq7HBDh8c';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// עמודות קבועות (0-based): A=0,B=1,C=2,D=3,E=4,F=5,G=6,H=7,I=8
const C_ROOM=0, C_AREA=1, C_PROF=2, C_ITEM=3, C_STATUS=5, C_NOTE=6;

let accessToken=null, tokenClient=null;
let sheetData=[], rooms=[], answers={};
let currentRoomIdx=0, sheetTitle='';

function roomKey(room,area){ return room+'||'+(area||''); }

window.addEventListener('load', ()=>{
  setTimeout(()=>{
    try {
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        callback:(resp)=>{
          if(resp.error){showToast('שגיאה: '+resp.error,'error');return;}
          accessToken=resp.access_token;
          loadSheet();
        }
      });
      document.getElementById('btnSignInText').textContent='התחבר עם Google';
      document.getElementById('btnSignIn').disabled=false;
    } catch(e){
      document.getElementById('btnSignInText').textContent='שגיאה — רענן';
      console.error(e);
    }
  }, 800);
  document.getElementById('btnSignIn').disabled=true;
});

function signIn(){
  if(!tokenClient){showToast('ממתין לטעינה...','error');return;}
  tokenClient.requestAccessToken();
}

function today(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showToast(msg,type,dur){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'');
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),dur||3000);
}
function setProgress(cur,total){
  const pct=total?Math.round((cur/total)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`חדר ${cur} מתוך ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';
}
function colLetter(n){
  let s=''; while(n>0){s=String.fromCharCode(64+(n%26||26))+s;n=Math.floor((n-1)/26);} return s;
}
async function gFetch(url,opts={}){
  const res=await fetch(url,{...opts,headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
  const data=await res.json();
  if(!res.ok) throw new Error(data.error?.message||`HTTP ${res.status}`);
  return data;
}

async function loadSheet(){
  document.getElementById('mainHeader').style.display='block';
  document.getElementById('progressWrap').style.display='block';
  showScreen('screenLoading');

  try {
    document.getElementById('loadingMsg').textContent='מתחבר לגיליון...';
    const meta=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=properties.title,sheets.properties`);
    const clientName=meta.properties.title;
    const skip=['הגדרות לקוח','Sheet1','גיליון1','גיליון 1'];
    const dateSheets=meta.sheets.map(s=>s.properties).filter(s=>!skip.includes(s.title));
    if(!dateSheets.length) throw new Error('לא נמצא גיליון ביקורת.');

    sheetTitle=dateSheets[dateSheets.length-1].title;
    document.getElementById('headerClient').textContent=clientName;
    document.getElementById('headerDate').textContent=today();
    currentDate=today();
    document.getElementById('headerSub').textContent=`גיליון: ${sheetTitle}`;

    document.getElementById('loadingMsg').textContent='קורא נתונים...';
    const dataRes=await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetTitle)}`);
    const rows=dataRes.values||[];

    // מצא שורת כותרת — סרוק את כל השורות
    // מחפש שורה שבה עמודה A מכילה בדיוק "חלל"
    let hIdx = -1;
    for(let i=0; i<rows.length; i++){
      const cell = rows[i]?.[0]?.toString().trim();
      if(cell === 'חלל'){
        hIdx = i;
        break;
      }
    }
    // אם לא מצא בדיוק — נסה חיפוש חלקי
    if(hIdx === -1){
      for(let i=0; i<rows.length; i++){
        if(rows[i]?.some(c=>c?.toString().trim()==='חלל')){
          hIdx=i; break;
        }
      }
    }
    if(hIdx === -1) throw new Error(`לא נמצאה שורת כותרת. שורות שנקראו: ${rows.length}`);

    sheetData=[]; rooms=[]; answers={};
    const roomKeySet=new Set();
    let lastRoom='', lastArea='', lastProf='';

    for(let i=hIdx+1; i<rows.length; i++){
      const row=rows[i]||[];

      // carry-forward לתאים ממוזגים
      const rawRoom=row[C_ROOM]?.toString().trim();
      const rawArea=row[C_AREA]?.toString().trim();
      const rawProf=row[C_PROF]?.toString().trim();

      if(rawRoom) lastRoom=rawRoom;
      if(rawArea) lastArea=rawArea;
      if(rawProf) lastProf=rawProf;

      const room=lastRoom;
      const area=lastArea;
      const prof=lastProf;
      const item=row[C_ITEM]?.toString().trim()||'';

      // דלג על שורות לא רלוונטיות
      if(!room || !item) continue;
      if(item==='הערות נוספות'||item==='פירוט'||item==='מה נבדק') continue;
      if(room==='חלל') continue;
      if(prof==='מה נבדק'||prof==='מקצוע') continue;
      if(room.startsWith('סה')||item.startsWith('סה')||room.startsWith('📊')) continue;
      if(!prof) continue;

      const rk=roomKey(room,area);
      if(!roomKeySet.has(rk)){
        roomKeySet.add(rk);
        rooms.push({room,area,key:rk});
      }

      const existStatus=row[C_STATUS]?.toString()||'';
      answers[i]={
        status: null,
        note: '',
        rowIndex: i+1,
        statusCol: C_STATUS+1,
        noteCol: C_NOTE+1
      };
      sheetData.push({roomKey:rk, room, area, prof, item, key:i});
    }

    if(!rooms.length) throw new Error(`נמצאו 0 חדרים. שורת כותרת בשורה ${hIdx+1}, סה״כ שורות: ${rows.length}.`);

    currentRoomIdx=0;
    renderRoom();
    showScreen('screenInspect');
    setProgress(1,rooms.length);

  } catch(e){
    showScreen('screenLogin');
    document.getElementById('mainHeader').style.display='none';
    document.getElementById('progressWrap').style.display='none';
    showToast('❌ '+e.message,'error',6000);
    console.error(e);
  }
}

function renderRoom(){
  const {room,area,key:rk}=rooms[currentRoomIdx];
  document.getElementById('roomCounter').textContent=`${currentRoomIdx+1} מתוך ${rooms.length}`;
  document.getElementById('currentRoomName').textContent=room;
  document.getElementById('currentRoomArea').textContent=area||'';
  document.getElementById('btnNext').textContent=currentRoomIdx===rooms.length-1?'סיים ←':'הבא ←';
  document.getElementById('btnPrev').style.opacity=currentRoomIdx===0?'0.3':'1';

  document.getElementById('roomDots').innerHTML=rooms.map((_,i)=>
    `<div class="room-dot ${i<currentRoomIdx?'done':i===currentRoomIdx?'current':''}"></div>`
  ).join('');

  const roomItems=sheetData.filter(d=>d.roomKey===rk);
  const byProf={};
  roomItems.forEach(d=>{if(!byProf[d.prof])byProf[d.prof]=[];byProf[d.prof].push(d);});

  document.getElementById('professionsList').innerHTML=Object.entries(byProf).map(([prof,items])=>`
    <div class="prof-section">
      <div class="prof-title">${prof}</div>
      ${items.map(d=>{
        const a=answers[d.key];
        const eid='e'+d.key;
        return `
        <div class="item-row ${a.status==='ok'?'is-ok':a.status==='bad'?'is-bad':''}" id="${eid}">
          <div class="item-top">
            <span class="item-name">${d.item}</span>
            <div class="toggle-group">
              <button class="toggle-btn ${a.status==='ok'?'ok':''}" onclick="setStatus(${d.key},'${eid}',this,'ok')">✓</button>
              <button class="toggle-btn ${a.status==='bad'?'bad':''}" onclick="setStatus(${d.key},'${eid}',this,'bad')">✗</button>
            </div>
          </div>
          <div class="note-wrap">
            <input class="note-input" placeholder="הערה..." value="${(a.note||'').replace(/"/g,'&quot;')}"
              onchange="answers[${d.key}].note=this.value" />
          </div>
          <div class="photo-wrap ${a.status==='bad'?'visible':''}" id="photo-wrap-${d.key}">
            <div class="photo-preview" id="photo-preview-${d.key}"></div>
            <label class="btn-photo">
              📷 צרף תמונה
              <input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos(${d.key},this)" />
            </label>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');

  setProgress(currentRoomIdx+1,rooms.length);
}

function setStatus(key,eid,btn,status){
  const a=answers[key];
  a.status=a.status===status?null:status;
  btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b=>b.className='toggle-btn');
  if(a.status) btn.classList.add(a.status==='ok'?'ok':'bad');
  const el=document.getElementById(eid);
  if(el) el.className=`item-row ${a.status==='ok'?'is-ok':a.status==='bad'?'is-bad':''}`;
  // show/hide photo wrap
  const pw=document.getElementById('photo-wrap-'+key);
  if(pw) pw.className='photo-wrap'+(a.status==='bad'?' visible':'');
}

function addPhotos(key,input){
  if(!answers[key].photos) answers[key].photos=[];
  const files=Array.from(input.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const dataUrl=e.target.result;
      answers[key].photos.push(dataUrl);
      renderPhotoPreview(key);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderPhotoPreview(key){
  const wrap=document.getElementById('photo-preview-'+key);
  if(!wrap) return;
  const photos=answers[key].photos||[];
  wrap.innerHTML=photos.map((src,i)=>`
    <div class="photo-thumb-wrap">
      <img class="photo-thumb" src="${src}" />
      <button class="photo-remove" onclick="removePhoto(${key},${i})">×</button>
    </div>`).join('');
}

function removePhoto(key,idx){
  answers[key].photos.splice(idx,1);
  renderPhotoPreview(key);
}

function editDate(){
  const el=document.getElementById('headerDate');
  const cur=el.textContent;
  const input=document.createElement('input');
  input.className='date-edit-input';
  input.value=cur;
  el.replaceWith(input);
  input.focus();
  input.select();
  const done=()=>{
    const newEl=document.createElement('div');
    newEl.className='date-badge';
    newEl.id='headerDate';
    newEl.title='לחץ לעריכה';
    newEl.textContent=input.value||cur;
    newEl.onclick=editDate;
    input.replaceWith(newEl);
    currentDate=newEl.textContent;
  };
  input.onblur=done;
  input.onkeydown=e=>{ if(e.key==='Enter') done(); };
}

let currentDate='';
  if(currentRoomIdx<rooms.length-1){currentRoomIdx++;renderRoom();}
  else showSummary();
}
function prevRoom(){
  if(currentRoomIdx>0){currentRoomIdx--;renderRoom();}
}

function showSummary(){
  let ok=0,bad=0;
  const defects=[];
  sheetData.forEach(d=>{
    const a=answers[d.key];
    if(a.status==='ok') ok++;
    else if(a.status==='bad'){bad++;defects.push({...d,note:a.note});}
  });
  document.getElementById('statOk').textContent=ok;
  document.getElementById('statBad').textContent=bad;
  const total=ok+bad;
  document.getElementById('statPct').textContent=total?Math.round((bad/total)*100)+'%':'—';
  document.getElementById('summaryInfo').textContent=`${currentDate||today()} · ${sheetTitle}`;
  document.getElementById('defectList').innerHTML=defects.length
    ?defects.map(d=>{
      const photos=(answers[d.key].photos||[]);
      const photosHtml=photos.length?`<div class="defect-photos">${photos.map(src=>`<img class="defect-photo" src="${src}" />`).join('')}</div>`:'';
      return `<div class="defect-item"><div class="defect-room">${d.room}${d.area?' · '+d.area:''} · ${d.prof}</div><div class="defect-name">${d.item}</div>${d.note?`<div class="defect-note">${d.note}</div>`:''}${photosHtml}</div>`;
    }).join('')
    :'<div class="no-defects">אין ליקויים 🎉</div>';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='הושלם';
  document.getElementById('progressPct').textContent='100%';
  showScreen('screenSummary');
}

async function saveToSheets(){
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='שומר...';
  try {
    const data=sheetData.flatMap(d=>{
      const a=answers[d.key];
      return [
        {range:`${sheetTitle}!${colLetter(a.statusCol)}${a.rowIndex}`,values:[[a.status==='ok'?'✅':a.status==='bad'?'❌':'']]},
        {range:`${sheetTitle}!${colLetter(a.noteCol)}${a.rowIndex}`,values:[[a.note||'']]}
      ];
    });
    await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchUpdate`,
      {method:'POST',body:JSON.stringify({valueInputOption:'RAW',data})});
    let ok=0,bad=0;
    Object.values(answers).forEach(a=>{if(a.status==='ok')ok++;else if(a.status==='bad')bad++;});
    document.getElementById('savedMsg').textContent=`${ok} תקינים · ${bad} ליקויים · ${sheetTitle}`;
    showScreen('screenDone');
  } catch(e){
    btn.disabled=false; btn.textContent='שמור לגיליון ←';
    showToast('❌ שגיאה: '+e.message,'error',5000);
    console.error(e);
  }
}

function resetApp(){
  sheetData=[]; rooms=[]; answers={}; currentRoomIdx=0; accessToken=null;
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  showScreen('screenLogin');
  setTimeout(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID, scope:SCOPES,
      callback:(resp)=>{if(!resp.error){accessToken=resp.access_token;loadSheet();}}
    });
  },300);
}
</script>
